name: Build
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: build-pack
      uses: thedoctor0/zip-release@master
      with:
        type: 'zip'
        filename: 'pack.zip'
        exclusions: '*.git* packs/example/** *.zip'
