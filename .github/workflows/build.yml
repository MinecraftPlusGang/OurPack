name: Build
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: papeloto/action-zip@v1
        with:
          files: packs/** pack.mcmeta
          dest: ${{ github.workspace }}/pack.zip
      - uses: actions/upload-artifact@v1
        with:
          name: resource-pack
          path: ${{ github.workspace }}/pack.zip
