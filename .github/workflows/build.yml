name: Build Pack
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Resourcepack
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      
      # Runs commands using the runners shell
      - name: Run the builder
      - uses: MinecraftPlusGang/ZipUp@v1.0.6
        with:
          files: '["packs/**", "pack.mcmeta"]'
          out-path: 'pack.zip'
      - name: Commit files  # transfer the pack back into the repository
        run: |
          git config --local user.name  ${{ github.actor }}
          git add ./**
          git commit -m "Auto-build of resource pack"
      - name: Push changes  # push the output folder to your repo
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
