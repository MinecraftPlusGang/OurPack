name: Build Pack
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Resourcepack
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v2
      
      - name: Run the builder
        uses: MinecraftPlusGang/ZipUp@v1.0.6
        with:
          files: '["packs/*/", "pack.mcmeta"]'
          out-path: 'pack.zip'
      
      - name: Commit files
        run: |
          git config --local user.name  ${{ github.actor }}
          git add ./**
          git commit -m "Auto-build of resource pack"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
